<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Backend Monitor</title>
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-panel: #1e293b;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #334155;
      
      --color-info: #38bdf8;
      --color-success: #4ade80;
      --color-warning: #facc15;
      --color-error: #f87171;
      --color-system: #c084fc;
      --color-websocket: #fb923c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background-color: var(--bg-panel);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-title { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--color-success); box-shadow: 0 0 8px var(--color-success); }
    .status-dot.disconnected { background-color: var(--color-error); box-shadow: 0 0 8px var(--color-error); }

    .stats-container {
      display: flex;
      gap: 1.5rem;
      font-size: 0.875rem;
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .stat-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-weight: 600; font-family: monospace; font-size: 1rem; }

    .toolbar {
      background-color: var(--bg-main);
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    input[type="text"] {
      background-color: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      outline: none;
      width: 250px;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--color-info); }

    .filters { display: flex; gap: 0.5rem; }
    .filter-btn {
      background-color: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { background-color: var(--color-info); color: #000; border-color: var(--color-info); font-weight: 600; }
    
    .filter-btn[data-type="ERROR"].active { background-color: var(--color-error); border-color: var(--color-error); }
    .filter-btn[data-type="WARNING"].active { background-color: var(--color-warning); border-color: var(--color-warning); }

    .auto-scroll-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.85rem;
      scroll-behavior: smooth;
    }

    .log-entry {
      background-color: var(--bg-panel);
      border-left: 4px solid var(--border);
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      border-radius: 0 0.375rem 0.375rem 0;
      word-break: break-all;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .log-header {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.25rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .log-time { color: var(--text-muted); font-size: 0.75rem; }
    .badge { 
      padding: 0.125rem 0.375rem; 
      border-radius: 0.25rem; 
      font-size: 0.7rem; 
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Log Types */
    .log-REQUEST { border-left-color: var(--color-info); }
    .log-REQUEST .badge-type { background-color: rgba(56, 189, 248, 0.2); color: var(--color-info); }
    
    .log-ERROR { border-left-color: var(--color-error); background-color: rgba(248, 113, 113, 0.05); }
    .log-ERROR .badge-type { background-color: var(--color-error); color: #000; }
    
    .log-WARNING { border-left-color: var(--color-warning); background-color: rgba(250, 204, 21, 0.05); }
    .log-WARNING .badge-type { background-color: var(--color-warning); color: #000; }
    
    .log-SYSTEM { border-left-color: var(--color-system); }
    .log-SYSTEM .badge-type { background-color: rgba(192, 132, 252, 0.2); color: var(--color-system); }

    .log-WEBSOCKET { border-left-color: var(--color-websocket); }
    .log-WEBSOCKET .badge-type { background-color: rgba(251, 146, 60, 0.2); color: var(--color-websocket); }

    .log-details {
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .log-meta { display: flex; gap: 1rem; color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem; }
    
    .method { font-weight: 700; }
    .method-GET { color: #4ade80; }
    .method-POST { color: #facc15; }
    .method-PUT { color: #60a5fa; }
    .method-DELETE { color: #f87171; }

    .status-200 { color: #4ade80; }
    .status-400 { color: #facc15; }
    .status-500 { color: #f87171; }

    .duration.fast { color: #4ade80; }
    .duration.medium { color: #facc15; }
    .duration.slow { color: #f87171; font-weight: bold; }

    pre {
      background: #0f172a;
      padding: 0.5rem;
      border-radius: 0.25rem;
      margin-top: 0.5rem;
      overflow-x: auto;
      font-size: 0.75rem;
      color: #cbd5e1;
    }

    .spam-warning {
      animation: pulseWarning 2s infinite;
    }

    @keyframes pulseWarning {
      0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
      100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <div id="connection-status" class="status-dot"></div>
      Perpustakaan Realtime Monitor
    </div>
    
    <div class="stats-container">
      <div class="stat-box">
        <span class="stat-label">CPU Usage</span>
        <span class="stat-value" id="stat-cpu">0.0%</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Memory Heap</span>
        <span class="stat-value" id="stat-mem">0 MB</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Active SSE</span>
        <span class="stat-value" id="stat-sse">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Req / Sec</span>
        <span class="stat-value" id="stat-rps">0</span>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search logs (Endpoint, IP, Message)...">
    
    <div class="filters" id="filters">
      <button class="filter-btn active" data-type="ALL">All</button>
      <button class="filter-btn" data-type="ERROR">Errors</button>
      <button class="filter-btn" data-type="WARNING">Warnings</button>
      <button class="filter-btn" data-type="REQUEST">Requests</button>
      <button class="filter-btn" data-type="WEBSOCKET">WebSocket</button>
      <button class="filter-btn" data-type="SYSTEM">System</button>
    </div>

    <label class="auto-scroll-toggle">
      <input type="checkbox" id="autoScroll" checked>
      Auto-scroll to bottom
    </label>
  </div>

  <main id="logContainer"></main>

  <script>
    const logContainer = document.getElementById('logContainer');
    const autoScroll = document.getElementById('autoScroll');
    const searchInput = document.getElementById('searchInput');
    const statusIndicator = document.getElementById('connection-status');
    
    let activeFilter = 'ALL';
    let logsCount = 0;
    const MAX_LOGS = 1000;
    
    let reqsPerSecond = 0;
    setInterval(() => {
      document.getElementById('stat-rps').textContent = reqsPerSecond;
      reqsPerSecond = 0;
    }, 1000);

    // Setup Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        activeFilter = e.target.getAttribute('data-type');
        filterLogs();
      });
    });

    searchInput.addEventListener('input', filterLogs);

    function filterLogs() {
      const term = searchInput.value.toLowerCase();
      const entries = document.querySelectorAll('.log-entry');
      
      entries.forEach(entry => {
        const type = entry.getAttribute('data-type');
        const content = entry.textContent.toLowerCase();
        
        const matchesFilter = activeFilter === 'ALL' || type === activeFilter;
        const matchesSearch = term === '' || content.includes(term);
        
        entry.style.display = (matchesFilter && matchesSearch) ? 'block' : 'none';
      });
      
      if (autoScroll.checked) scrollToBottom();
    }

    function scrollToBottom() {
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function connectSSE() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const streamUrl = '/logs/stream' + (token ? '?token=' + encodeURIComponent(token) : '');
      const eventSource = new EventSource(streamUrl);

      eventSource.onopen = () => {
        statusIndicator.classList.remove('disconnected');
      };

      eventSource.onerror = () => {
        statusIndicator.classList.add('disconnected');
        eventSource.close();
        setTimeout(connectSSE, 5000); // Reconnect loop
      };

      eventSource.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          renderLog(data);
        } catch (err) {
          console.error('Failed to parse log:', err);
        }
      };
    }

    function formatTime(isoString) {
      const d = new Date(isoString);
      return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}.${d.getMilliseconds().toString().padStart(3, '0')}`;
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function updateSystemStats(data) {
      if (data.cpuUsage !== undefined) {
        document.getElementById('stat-cpu').textContent = `${data.cpuUsage}%`;
      }
      if (data.memoryUsage?.heapUsed) {
        document.getElementById('stat-mem').textContent = formatBytes(data.memoryUsage.heapUsed);
      }
      if (data.activeSSEClients !== undefined) {
        document.getElementById('stat-sse').textContent = data.activeSSEClients;
      }
    }

    function renderLog(data) {
      if (data.type === 'REQUEST') reqsPerSecond++;
      if (data.type === 'SYSTEM') updateSystemStats(data);

      const div = document.createElement('div');
      div.className = `log-entry log-${data.type}`;
      div.setAttribute('data-type', data.type);
      
      if (data.message && data.message.includes('LOOP')) div.classList.add('spam-warning');
      if (data.message && data.message.includes('SPAM')) div.classList.add('spam-warning');
      if (data.message && data.message.includes('TOO MANY')) div.classList.add('spam-warning');

      let html = `<div class="log-header">
        <span class="log-time">${formatTime(data.timestamp)}</span>
        <span class="badge badge-type">${data.type}</span>`;
      
      if (data.method) {
        html += `<span class="method method-${data.method}">${data.method}</span>`;
      }
      if (data.statusCode) {
        const statusClass = data.statusCode >= 500 ? 'status-500' : (data.statusCode >= 400 ? 'status-400' : 'status-200');
        html += `<span class="badge ${statusClass}">HTTP ${data.statusCode}</span>`;
      }
      html += `</div>`;

      html += `<div class="log-details">`;
      
      if (data.endpoint) {
        html += `<div><strong>${data.endpoint}</strong></div>`;
      }
      if (data.message) {
        html += `<div>${data.message}</div>`;
      }

      // Meta info row
      let meta = [];
      if (data.duration) {
        const durClass = data.duration < 200 ? 'fast' : (data.duration < 1000 ? 'medium' : 'slow');
        meta.push(`<span class="duration ${durClass}">${data.duration}ms</span>`);
      }
      if (data.ip) meta.push(`IP: ${data.ip}`);
      if (data.userId) meta.push(`User: ${data.userId}`);
      if (data.retryCount) meta.push(`Retries: ${data.retryCount}`);
      if (data.socketId) meta.push(`Socket: ${data.socketId}`);
      if (data.responseSize) meta.push(`Size: ${formatBytes(data.responseSize)}`);
      
      if (meta.length > 0) {
        html += `<div class="log-meta">${meta.join(' • ')}</div>`;
      }
      
      if (data.stack) {
        html += `<pre>${data.stack}</pre>`;
      }
      
      html += `</div>`;
      div.innerHTML = html;

      // Apply current filters
      const matchesFilter = activeFilter === 'ALL' || data.type === activeFilter;
      const term = searchInput.value.toLowerCase();
      const matchesSearch = term === '' || div.textContent.toLowerCase().includes(term);
      div.style.display = (matchesFilter && matchesSearch) ? 'block' : 'none';

      logContainer.appendChild(div);
      logsCount++;

      if (logsCount > MAX_LOGS) {
        logContainer.firstChild.remove();
        logsCount--;
      }

      if (autoScroll.checked) scrollToBottom();
    }

    // Start
    connectSSE();
  </script>
</body>
</html>
